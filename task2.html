<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Tasks</title>
    <style>

        /* Task 6 */
        h1{
            color:red;
        }

        p{
            color:blue;
        }

        /* Task 7 */
        .para{
            font-size:18px;
            font-family:Arial;
        }

        /* Task 8 */
        .heading1{
            color:purple;
        }

        .heading2{
            color:green;
        }

        .paragraph{
            color:orange;
        }

        /* Task 9 */
        .login-form{
            background-color:lightgray;
            padding:20px;
        }

        .login-form input{
            width:300px;
        }

        /* Task 10 */
        table{
            border-collapse:collapse;
            background-color:lightblue;
        }

        th,td{
            border:1px solid black;
            padding:10px;
        }

    </style>
</head>
<body>
    <!-- Task 1 -->
    <h1 style="color: blue;">Welcome to CSS</h1>
    <!-- Task 2 -->
    <p style="font-size:20px; color:green;">
        This is a paragraph using Inline CSS.
    </p>
    <!-- Task 3 -->
    <button style="background-color:orange; color:white;">
        Click Me
    </button>
    <hr>
    <!-- Task 4 -->
    <h1 style="color:red;">Heading 1</h1>
    <h1 style="color:green;">Heading 2</h1>
    <h1 style="color:blue;">Heading 3</h1>
    <hr>
    <!-- Task 5 -->
    <table border="1"
        style="background-color:yellow; text-align:center;">
        <tr>
            <th>ID</th>
            <th>Name</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Sagar</td>
        </tr>
    </table>
     <!-- Task 6 -->
    <h1>Internal CSS Heading</h1>
    <p>Paragraph using internal CSS.</p>

    <hr>

    <!-- Task 7 -->
    <p class="para">Paragraph 1</p>
    <p class="para">Paragraph 2</p>
    <p class="para">Paragraph 3</p>

    <hr>

    <!-- Task 8 -->
    <h1 class="heading1">Heading 1</h1>
    <h2 class="heading2">Heading 2</h2>
    <p class="paragraph">Paragraph</p>

    <hr>

    <!-- Task 9 -->
    <div class="login-form">
        <h2>Login Form</h2>

        <input type="text" placeholder="Username">
        <br><br>

        <input type="password" placeholder="Password">
        <br><br>

        <button>Login</button>
    </div>

    <hr>

    <!-- Task 10 -->
    <table>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Sagar</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Rahul</td>
        </tr>
    </table>


</body>
</html>
