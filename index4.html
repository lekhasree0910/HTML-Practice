<!DOCTYPE html>
<html>
<head>
    <title>Selectors Practice</title>

    <style>

        /* Task 16 */
        h1{
            color:red;
        }

        p{
            color:blue;
        }

        /* Task 17 */
        .highlight{
            background-color:yellow;
            color:black;
        }

        /* Task 18 */
        .card{
            border:1px solid black;
            padding:20px;
            box-shadow:2px 2px 8px gray;
            margin:10px;
        }

        /* Task 19 */
        #title{
            color:darkblue;
            text-align:center;
        }

        /* Task 20 */
        #main-title{
            text-align:center;
        }

        .content{
            color:blue;
        }

        button{
            background-color:green;
            color:white;
            padding:10px;
        }

    </style>
</head>
<body>

    <!-- Task 16 -->
    <h1>Heading</h1>
    <p>Paragraph</p>

    <hr>

    <!-- Task 17 -->
    <p class="highlight">
        Highlighted Paragraph
    </p>

    <hr>

    <!-- Task 18 -->
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>

    <hr>

    <!-- Task 19 -->
    <h1 id="title">Welcome</h1>

    <hr>

    <!-- Task 20 -->
    <h1 id="main-title">Main Title</h1>

    <p class="content">
        This is content text.
    </p>

    <button>Submit</button>

</body>
</html>
